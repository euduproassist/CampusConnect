<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlexiPass - Instant Access Passes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #1d6ed0;
            --light-blue-bg: #eaf3ff;
            --text-dark: #0a1128;
            --text-muted: #5c6479;
            --border-color: #eef2f6;
            --bg-gray: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: #121212; /* Dark ambient background for TVs/large displays */
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* App Wrapper to maintain exact mobile rendering across TVs, tablets, and phones */
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* Hide Scrollbar for clean app presentation */
        .app-container::-webkit-scrollbar {
            width: 0px;
        }

        /* Full Screen Loading Overlay */
        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.4s ease;
        }

        /* Header Layout */
        .header {
            width: 100%;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            background: #ffffff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 28px;
            height: 28px;
            background: var(--primary-blue);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .brand h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .menu-btn {
            font-size: 1.4rem;
            color: var(--text-dark);
            cursor: pointer;
        }

        /* Sub-Navigation Links */
        .sub-nav {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .nav-item.active {
            color: var(--primary-blue);
            font-weight: 600;
            border-bottom: 2px solid var(--primary-blue);
            padding-bottom: 2px;
        }

        /* Main Scrollable Content Box */
        .main-content {
            flex: 1;
            padding: 24px 20px;
        }

        /* Micro-badge notice */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--light-blue-bg);
            color: var(--primary-blue);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        /* Hero Text Area */
        .hero-section h2 {
            font-size: 1.9rem;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        .hero-section p {
            font-size: 0.92rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 24px;
        }

        /* Phone mockup image layout */
        .mockup-display {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .mockup-card {
            width: 140px;
            height: 220px;
            border: 4px solid #1a365d;
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .mockup-screen {
            width: 100%;
            height: 100%;
            background: var(--primary-blue);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            gap: 8px;
            text-align: center;
        }

        .mockup-screen i { font-size: 1.5rem; }
        .mockup-screen span { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.5px; }
        .mockup-screen .check-circle { font-size: 1rem; }

        /* Action Buttons */
        .actions-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--primary-blue);
            color: white;
            border: none;
        }

        .btn-secondary {
            background-color: #ffffff;
            color: var(--primary-blue);
            border: 1px solid var(--primary-blue);
        }

        .btn:active {
            opacity: 0.8;
        }

        /* How it works section */
        .section-title {
            text-align: center;
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .steps-flow {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 36px;
            position: relative;
            padding: 0 10px;
        }

        .step-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 22%;
            position: relative;
        }

        .step-icon-wrapper {
            width: 42px;
            height: 42px;
            background: var(--bg-gray);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-blue);
            font-size: 1rem;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }

        .step-label {
            font-size: 0.68rem;
            color: var(--text-dark);
            line-height: 1.3;
            font-weight: 500;
        }

        .step-number {
            display: inline-flex;
            width: 14px;
            height: 14px;
            background: var(--primary-blue);
            color: white;
            border-radius: 50%;
            font-size: 0.55rem;
            align-items: center;
            justify-content: center;
            margin-bottom: 4px;
            font-weight: 700;
        }

        /* Grid System for the Popular Passes */
        .passes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .passes-header h3 { font-size: 1.1rem; font-weight: 700; }
        .view-all { font-size: 0.78rem; color: var(--primary-blue); font-weight: 600; text-decoration: none; }

        .passes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 32px;
        }

        .pass-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 6px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .pass-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .pass-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .pass-duration {
            font-size: 0.62rem;
            color: var(--text-muted);
        }

        /* Features/Trust badging footer grid */
        .trust-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            background: var(--bg-gray);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .trust-item {
            display: flex;
            align-items: center;
            gap: 8px;
            text-align: left;
        }

        .trust-item i {
            color: var(--primary-blue);
            font-size: 0.95rem;
        }

        .trust-text h5 {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .trust-text p {
            font-size: 0.62rem;
            color: var(--text-muted);
        }

        /* Domain Bottom Bar decoration */
        .domain-footer {
            text-align: center;
            padding: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Auto Scaling Adaptations for wider displays (Tablets/TVs) */
        @media (min-width: 451px) {
            .app-container {
                height: 850px;
                border-radius: 32px;
                border: 8px solid #1e293b;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="loader">
            <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary-blue);"></i>
        </div>

        <div class="header">
            <div class="brand">
                <div class="brand-icon">F</div>
                <h1>FlexiPass</h1>
            </div>
            <div class="menu-btn">
                <i class="fas fa-bars"></i>
            </div>
        </div>

        <div class="sub-nav">
            <span class="nav-item active">Home</span>
            <span class="nav-item">Pricing</span>
            <span class="nav-item">Activation Status</span>
            <span class="nav-item">Support</span>
        </div>


        <div class="domain-footer">
            <i class="fas fa-lock" style="font-size: 0.7rem;"></i> flexipass.com
        </div>
    </div>

    <script>
        // Smooth Loader Exit Handler
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 400);
            }, 300);
        });
    </script>
</body>
</html>
