<!DOCTYPE html>
<html>
<head>
    <title>Staff Portal - CampusConnect</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; max-width: 1000px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .status-pill { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; background: #eef6ff; }
        #detailsPanel { margin-top: 30px; padding: 20px; border: 1px solid #ddd; display: none; }
        .btn-action { padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Staff Portal</h1>
        <table id="ticketTable">
            <thead>
                <tr><th>Name</th><th>Student Number</th><th>Query</th><th>Status</th><th>Date</th></tr>
            </thead>
            <tbody id="ticketBody"></tbody>
        </table>

        <div id="detailsPanel">
            <h3>Ticket Details</h3>
            <p id="detailText"></p>
            <button class="btn-action" onclick="updateStatus('Approved')">Approve</button>
            <button class="btn-action" onclick="updateStatus('Denied')">Deny</button>
            <div style="margin-top:20px;">
                <input type="text" id="internalNote" placeholder="Add note...">
                <button onclick="saveNote()">Save Note</button>
            </div>
        </div>
    </div>
    <script type="module" src="staff.js"></script>
</body>
</html>
