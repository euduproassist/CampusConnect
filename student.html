<!DOCTYPE html>
<html>
<body>
    <div id="portal" class="grid">
        <div class="card">
            <h3>Finance / Fees</h3>
            <ul onclick="openTicketModal('Finance / Fees')">
                <li>Tuition & Payment Queries</li>
                <li>Receipts & Proof of Payment</li>
                <li>Refunds / Overpayments</li>
                <li>Financial Aid / Bursaries</li>
            </ul>
        </div>
        </div>

    <div id="ticketModal" style="display:none;">
        <select id="queryType"></select>
        <textarea id="desc" placeholder="Describe your request..."></textarea>
        <input type="file" id="fileUpload">
        <button onclick="submitTicket()">Submit Ticket</button>
    </div>
    
    <script type="module" src="student.js"></script>
</body>
</html>
